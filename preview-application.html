<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pre-Release Application</title>
</head>
<body>
<h1>Pre-Release Signup</h1>
<form id="form">
<input placeholder="Name" required id="name"><br>
<input placeholder="Email" required id="email"><br>
<select id="grade">
<option>9</option><option>10</option><option>11</option><option>12</option>
</select><br>
<button type="submit">Submit</button>
</form>
<p id="msg"></p>
<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

document.getElementById('form').addEventListener('submit', async (e)=>{
 e.preventDefault();
 await addDoc(collection(db, "previewApplications"),{
 name: name.value,
 email: email.value,
 grade: grade.value,
 createdAt: serverTimestamp()
 });
 msg.textContent = "Submitted!";
});
</script>
</body>
</html>
