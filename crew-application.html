<!DOCTYPE html>
<html>
<head><title>Crew Application</title></head>
<body>
<h1>Staff / Crew Application</h1>
<form id="form">
<input placeholder="Name" id="name" required><br>
<input placeholder="Phone" id="phone" required><br>
<input placeholder="Email" id="email" required><br>
<select id="grade"><option>9</option><option>10</option><option>11</option><option>12</option></select><br>
<input placeholder="Role Requests" id="role"><br>
<textarea placeholder="Reason for wanting to join" id="reason"></textarea><br>
<button type="submit">Submit</button>
</form>
<p id="msg"></p>
<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
form.addEventListener('submit', async (e)=>{
 e.preventDefault();
 await addDoc(collection(db, "crewApplications"),{
 name:name.value,
 phone:phone.value,
 email:email.value,
 grade:grade.value,
 role:role.value,
 reason:reason.value,
 createdAt: serverTimestamp()
 });
 msg.textContent="Submitted!";
});
</script>
</body>
</html>
